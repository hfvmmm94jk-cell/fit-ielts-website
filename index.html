<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit IELTS English - iPad优化版</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin:0; padding:20px; background:#f4f7fa; font-size:18px; }
        header { background: linear-gradient(135deg, #4CAF50, #2196F3); color:white; padding:30px; text-align:center; border-radius:15px; }
        .card { background:white; padding:25px; margin:20px 0; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
        input { width:100%; padding:15px; font-size:18px; margin:10px 0; border-radius:8px; border:1px solid #ddd; }
        button { font-size:18px; padding:12px 25px; margin:10px 0; background:#2196F3; color:white; border:none; border-radius:10px; }
    </style>
</head>
<body>
    <header>
        <h1>💪 Fit IELTS English</h1>
        <p>健身教练专属英语学习站 - iPad优化</p>
    </header>

    <div class="card">
        <h2>词汇快速搜索</h2>
        <input type="text" placeholder="搜索词汇..." onkeyup="alert('演示搜索：找到 Engage your core = 收紧核心')">
    </div>

    <div class="card">
        <h2>今日学习</h2>
        <button onclick="alert('已记录今日进度！继续加油💪')">记录今天学习</button>
        <p><a href="https://www.youtube.com/watch?v=qdJ7ks-2ZXI" target="_blank">1. Gym English Conversation 视频</a></p>
        <p><a href="https://www.youtube.com/watch?v=8vuzfcVel6I" target="_blank">2. English at the Gym</a></p>
    </div>

    <div class="card">
        <h2>我的页面</h2>
        <p>学习历史会在这里记录（可后续完善）</p>
    </div>
</body>
</html>
